<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📦 Stock Manager - Gestión de inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- NUEVO: Html5Qrcode (mejor que Quagga) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #f0f2f5;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .header {
            background: #0a192f;
            padding: 20px 30px;
            color: white;
            border-bottom: 3px solid #2b7a7a;
        }
        
        .header h1 { font-size: 24px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header p { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        
        .three-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
            min-height: 80vh;
        }
        
        .panel { padding: 24px; background: white; }
        .panel-left { border-right: 1px solid #e9ecef; }
        .panel-center { border-right: 1px solid #e9ecef; background: #fafbfc; }
        .panel-right { background: white; }
        
        .panel h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Escáner mejorado */
        .scanner-box {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            position: relative;
            min-height: 260px;
        }
        
        #scannerView {
            width: 100%;
            min-height: 260px;
            background: #000;
        }
        
        .scanner-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .manual-input { margin-top: 12px; }
        .manual-input label { font-size: 12px; color: #6c757d; display: block; margin-bottom: 6px; }
        .manual-input-row { display: flex; gap: 8px; }
        .manual-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #dee2e6; border-radius: 12px; font-family: monospace; font-size: 14px; }
        
        .scan-info {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #2b7a7a;
            text-align: center;
            margin-top: 12px;
        }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn-primary { background: #0a192f; color: white; }
        .btn-primary:hover { background: #1a2a4f; transform: translateY(-1px); }
        .btn-secondary { background: #e9ecef; color: #1a1a2e; border: 1px solid #dee2e6; }
        .btn-secondary:hover { background: #dee2e6; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-outline { background: transparent; border: 1px solid #2b7a7a; color: #2b7a7a; }
        .btn-outline:hover { background: #e8f4f8; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #495057; margin-bottom: 6px; }
        .form-group label i { width: 20px; color: #2b7a7a; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #dee2e6; border-radius: 12px; font-size: 14px; font-family: monospace; }
        .form-group input:focus { outline: none; border-color: #2b7a7a; box-shadow: 0 0 0 3px rgba(43,122,122,0.1); }
        
        .form-actions { display: flex; gap: 12px; margin-top: 20px; }
        .form-actions button { flex: 1; }
        
        .barcode-placeholder {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: #adb5bd;
            border: 2px dashed #dee2e6;
        }
        
        #barcodeContainer { background: white; padding: 20px; border-radius: 16px; text-align: center; }
        
        .sync-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e9ecef; }
        .sync-buttons { display: flex; gap: 12px; margin-top: 12px; }
        .sync-buttons button { flex: 1; }
        .local-actions { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .local-actions button, .local-actions label { flex: 1; text-align: center; }
        
        hr { margin: 20px 0; border: none; border-top: 1px solid #e9ecef; }
        
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-size: 14px;
        }
        
        @media (max-width: 900px) {
            .three-col-grid { grid-template-columns: 1fr; }
            .panel-left, .panel-center { border-right: none; border-bottom: 1px solid #e9ecef; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-boxes"></i> Stock Manager</h1>
        <p>Gestión de inventario en tiempo real</p>
    </div>

    <div class="three-col-grid">
        <!-- PANEL IZQUIERDO: Escáner MEJORADO -->
        <div class="panel panel-left">
            <h3><i class="fas fa-qrcode"></i> Escáner</h3>
            <div class="scanner-box">
                <div id="scannerView"></div>
            </div>
            <div class="scanner-buttons">
                <button id="startScannerBtn" class="btn btn-primary"><i class="fas fa-play"></i> Iniciar cámara</button>
                <button id="stopScannerBtn" class="btn btn-secondary"><i class="fas fa-stop"></i> Detener</button>
            </div>
            
            <div class="manual-input">
                <label><i class="fas fa-keyboard"></i> o ingresa el código manualmente</label>
                <div class="manual-input-row">
                    <input type="text" id="manualCodeInput" placeholder="Ej: 9788437604947">
                    <button id="applyManualCodeBtn" class="btn btn-outline"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
            
            <div id="scanResult" class="scan-info">
                <i class="fas fa-info-circle"></i> Escanea o ingresa un código para buscar
            </div>
        </div>

        <!-- PANEL CENTRAL: Código de barras -->
        <div class="panel panel-center">
            <h3><i class="fas fa-barcode"></i> Código de barras</h3>
            <div id="barcodeContainer">
                <div class="barcode-placeholder">
                    <i class="fas fa-barcode fa-2x"></i>
                    <p style="margin-top: 12px;">Aún no hay código</p>
                    <p style="font-size: 12px;">Escanea o ingresa un código de barras para ver la información del producto.</p>
                </div>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button id="downloadBarcodeBtn" class="btn btn-secondary" style="flex:1;"><i class="fas fa-download"></i> PNG</button>
                <button id="printBarcodeBtn" class="btn btn-secondary" style="flex:1;"><i class="fas fa-print"></i> Imprimir</button>
            </div>
        </div>

        <!-- PANEL DERECHO: Registrar producto -->
        <div class="panel panel-right">
            <h3><i class="fas fa-edit"></i> Registrar producto</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label><i class="fas fa-barcode"></i> Código *</label>
                    <input type="text" id="codeInput" required placeholder="Escanea o escribe el código">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Nombre *</label>
                    <input type="text" id="nameInput" required placeholder="Ej: Cien años de soledad">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Marca / Autor</label>
                    <input type="text" id="brandInput" placeholder="Opcional">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Precio ($)</label>
                    <input type="number" id="priceInput" step="0.01" placeholder="15.99">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-boxes"></i> Stock</label>
                    <input type="number" id="stockInput" value="1">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tags"></i> Categoría</label>
                    <input type="text" id="categoryInput" placeholder="Libros, electrónica, etc.">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" id="clearFormBtn" class="btn btn-secondary"><i class="fas fa-eraser"></i> Limpiar</button>
                </div>
            </form>

            <hr>

            <h3><i class="fas fa-cloud-upload-alt"></i> Sincronización</h3>
            <div class="sync-buttons">
                <button id="syncToCloudBtn" class="btn btn-primary"><i class="fas fa-cloud-upload-alt"></i> Sincronizar con la nube</button>
                <button id="syncFromCloudBtn" class="btn btn-success"><i class="fas fa-cloud-download-alt"></i> Cargar desde la nube</button>
            </div>
            <div id="cloudStatus" style="font-size: 11px; color: #6c757d; margin-top: 8px; text-align: center;"></div>

            <hr>

            <h3><i class="fas fa-database"></i> Datos locales</h3>
            <div class="local-actions">
                <button id="exportExcelBtn" class="btn btn-outline"><i class="fas fa-file-excel"></i> Exportar Excel</button>
                <button id="exportPdfBtn" class="btn btn-outline"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
                <label class="btn btn-outline" style="cursor: pointer;"><i class="fas fa-upload"></i> Importar JSON<input type="file" id="importFileInput" accept=".json" style="display:none;"></label>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ========== CONFIGURACIÓN ==========
    let products = [];
    let currentProductId = null;
    let html5QrCode = null;
    let isScanning = false;
    const GIST_ID_KEY = 'stock_gist_id_v3';

    // DOM elements
    const scannerView = document.getElementById('scannerView');
    const startBtn = document.getElementById('startScannerBtn');
    const stopBtn = document.getElementById('stopScannerBtn');
    const manualCodeInput = document.getElementById('manualCodeInput');
    const applyManualCodeBtn = document.getElementById('applyManualCodeBtn');
    const scanResultDiv = document.getElementById('scanResult');
    const codeInput = document.getElementById('codeInput');
    const nameInput = document.getElementById('nameInput');
    const brandInput = document.getElementById('brandInput');
    const priceInput = document.getElementById('priceInput');
    const stockInput = document.getElementById('stockInput');
    const categoryInput = document.getElementById('categoryInput');
    const productIdInput = document.getElementById('productId');
    const productForm = document.getElementById('productForm');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const syncToCloudBtn = document.getElementById('syncToCloudBtn');
    const syncFromCloudBtn = document.getElementById('syncFromCloudBtn');
    const exportExcelBtn = document.getElementById('exportExcelBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const importFileInput = document.getElementById('importFileInput');
    const downloadBarcodeBtn = document.getElementById('downloadBarcodeBtn');
    const printBarcodeBtn = document.getElementById('printBarcodeBtn');

    // Toast
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = isError ? `⚠️ ${msg}` : `✓ ${msg}`;
        toast.style.background = isError ? '#dc2626' : '#0a192f';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }

    // Cargar datos
    function loadProducts() {
        const stored = localStorage.getItem('stock_manager_v4');
        if (stored) {
            products = JSON.parse(stored);
            showToast(`Cargados ${products.length} productos`);
        } else {
            products = [];
            saveProducts();
        }
    }

    function saveProducts() {
        localStorage.setItem('stock_manager_v4', JSON.stringify(products));
    }

    function saveProduct(event) {
        event.preventDefault();
        const code = codeInput.value.trim();
        const name = nameInput.value.trim();
        const brand = brandInput.value.trim();
        const price = parseFloat(priceInput.value) || 0;
        const stock = parseInt(stockInput.value) || 0;
        const category = categoryInput.value.trim();

        if (!code || !name) {
            showToast('Código y nombre son obligatorios', true);
            return;
        }

        const id = productIdInput.value;
        if (id) {
            const index = products.findIndex(p => p.id === id);
            if (index !== -1) {
                products[index] = { ...products[index], code, name, brand, price, stock, category, updatedAt: new Date().toISOString() };
                saveProducts();
                showToast('Producto actualizado');
            }
        } else {
            const newId = Date.now().toString();
            products.push({ id: newId, code, name, brand, price, stock, category, createdAt: new Date().toISOString() });
            saveProducts();
            showToast('Producto agregado');
            productIdInput.value = newId;
        }
        generateBarcode(code);
        clearForm();
    }

    function clearForm() {
        productIdInput.value = '';
        codeInput.value = '';
        nameInput.value = '';
        brandInput.value = '';
        priceInput.value = '';
        stockInput.value = '1';
        categoryInput.value = '';
        currentProductId = null;
    }

    function generateBarcode(code) {
        if (!code) return;
        const container = document.getElementById('barcodeContainer');
        container.innerHTML = '<svg id="barcodeSvg"></svg>';
        const svg = document.getElementById('barcodeSvg');
        try {
            JsBarcode(svg, code, { format: "CODE128", width: 2, height: 60, lineColor: "#0a192f", background: "#ffffff", displayValue: true, fontSize: 12 });
        } catch(e) {
            container.innerHTML = '<div class="barcode-placeholder">Error generando código</div>';
        }
    }

    function fillFormWithProduct(product) {
        productIdInput.value = product.id;
        codeInput.value = product.code;
        nameInput.value = product.name;
        brandInput.value = product.brand || '';
        priceInput.value = product.price || '';
        stockInput.value = product.stock || 1;
        categoryInput.value = product.category || '';
        generateBarcode(product.code);
        showToast(`Producto cargado: ${product.name}`);
    }

    // ========== NUEVO ESCÁNER CON HTML5QRCODE (MÁS NITIDO) ==========
    async function startScanner() {
        if (isScanning) {
            showToast("El escáner ya está activo");
            return;
        }
        
        scanResultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Iniciando cámara...';
        
        html5QrCode = new Html5Qrcode("scannerView");
        
        const config = {
            fps: 10,
            qrbox: { width: 250, height: 100 },
            aspectRatio: 1.333,
            showTorchButtonIfSupported: true,
            rememberLastCameraUsed: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        };
        
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText, decodedResult) => {
                    // Éxito al escanear
                    if (decodedText && decodedText.length > 5) {
                        stopScanner();
                        scanResultDiv.innerHTML = `<i class="fas fa-check-circle"></i> Escaneado: ${decodedText}`;
                        codeInput.value = decodedText;
                        generateBarcode(decodedText);
                        
                        const existing = products.find(p => p.code === decodedText);
                        if (existing) {
                            fillFormWithProduct(existing);
                        } else {
                            clearForm();
                            codeInput.value = decodedText;
                            nameInput.focus();
                            showToast("Código detectado. Completa el formulario.");
                        }
                    }
                },
                (errorMessage) => {
                    // Error de escaneo (no mostrar cada error, es normal mientras busca)
                    // console.log(errorMessage);
                }
            );
            isScanning = true;
            scanResultDiv.innerHTML = '<i class="fas fa-video"></i> Cámara activa. Acerca el código lentamente.';
            showToast("Cámara activada - acerca el código de barras");
        } catch (err) {
            scanResultDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error al iniciar cámara. Prueba escribir manualmente.';
            showToast("No se pudo acceder a la cámara. Verifica los permisos.", true);
        }
    }

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
                html5QrCode.clear();
            } catch(e) {}
            isScanning = false;
            scanResultDiv.innerHTML = '<i class="fas fa-info-circle"></i> Escanea o ingresa un código para buscar';
            showToast("Cámara detenida");
        }
    }

    function applyManualCode() {
        const code = manualCodeInput.value.trim();
        if (code) {
            codeInput.value = code;
            generateBarcode(code);
            const existing = products.find(p => p.code === code);
            if (existing) {
                fillFormWithProduct(existing);
            } else {
                clearForm();
                codeInput.value = code;
                nameInput.focus();
                showToast("Código ingresado. Completa los datos.");
            }
            manualCodeInput.value = '';
        } else {
            showToast("Ingresa un código válido", true);
        }
    }

    // Sincronización con GitHub Gist
    async function syncToCloud() {
        const token = prompt("🔐 Token de GitHub (Settings → Developer settings → Personal access tokens → Tokens (classic) con permiso 'gist'):");
        if (!token) return;
        
        const data = JSON.stringify(products, null, 2);
        const gistId = localStorage.getItem(GIST_ID_KEY);
        
        try {
            let response;
            if (gistId) {
                response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { 'stock_inventory.json': { content: data } } })
                });
            } else {
                response = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: 'Stock Manager - Mi inventario', public: false, files: { 'stock_inventory.json': { content: data } } })
                });
            }
            if (response.ok) {
                const result = await response.json();
                if (!gistId) localStorage.setItem(GIST_ID_KEY, result.id);
                document.getElementById('cloudStatus').innerHTML = `<i class="fab fa-github"></i> ✅ Sincronizado! ID: ${result.id.substring(0,8)}`;
                showToast("Datos guardados en la nube");
            } else {
                showToast("Error al sincronizar", true);
            }
        } catch(e) { showToast("Error de conexión", true); }
    }

    async function syncFromCloud() {
        const token = prompt("🔐 Token de GitHub para recuperar datos:");
        if (!token) return;
        const gistId = localStorage.getItem(GIST_ID_KEY);
        if (!gistId) { showToast("No hay respaldo previo. Primero sincroniza desde este dispositivo.", true); return; }
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
            if (response.ok) {
                const gist = await response.json();
                const content = gist.files['stock_inventory.json']?.content;
                if (content) {
                    products = JSON.parse(content);
                    saveProducts();
                    showToast(`¡Sincronizado! ${products.length} productos cargados`);
                    clearForm();
                }
            } else { showToast("Error al recuperar", true); }
        } catch(e) { showToast("Error de conexión", true); }
    }

    // Exportar a Excel (CSV)
    function exportToExcel() {
        if (products.length === 0) { showToast("No hay productos para exportar", true); return; }
        const headers = ["ID", "Código", "Nombre", "Marca/Autor", "Precio", "Stock", "Categoría", "Fecha"];
        const rows = products.map(p => [p.id, p.code, p.name, p.brand || '', p.price || 0, p.stock || 0, p.category || '', p.createdAt || '']);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `inventario_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast("Exportado a Excel (CSV)");
    }

    // Exportar a PDF
    async function exportToPdf() {
        if (products.length === 0) { showToast("No hay productos para exportar", true); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape' });
        doc.setFontSize(16);
        doc.text("Reporte de Inventario - Stock Manager", 14, 15);
        doc.setFontSize(10);
        doc.text(`Generado: ${new Date().toLocaleString()}`, 14, 25);
        doc.text(`Total de productos: ${products.length}`, 14, 32);
        
        const tableData = products.map(p => [p.code, p.name, p.brand || '-', `$${p.price || 0}`, p.stock || 0, p.category || '-']);
        const headers = [["Código", "Nombre", "Marca/Autor", "Precio", "Stock", "Categoría"]];
        doc.autoTable({ head: headers, body: tableData, startY: 40, styles: { fontSize: 8 }, headStyles: { fillColor: [10, 25, 47] } });
        doc.save(`inventario_${new Date().toISOString().slice(0,10)}.pdf`);
        showToast("Exportado a PDF");
    }

    function importProducts(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    products = imported;
                    saveProducts();
                    showToast(`Importados ${products.length} productos`);
                    clearForm();
                } else throw new Error();
            } catch(err) { showToast('Archivo JSON inválido', true); }
        };
        reader.readAsText(file);
    }

    async function downloadBarcode() {
        const container = document.getElementById('barcodeContainer');
        if (!container.querySelector('svg')) { showToast('No hay código generado', true); return; }
        const canvas = await html2canvas(container, { scale: 3 });
        const link = document.createElement('a');
        link.download = `codigo_${codeInput.value || 'producto'}.png`;
        link.href = canvas.toDataURL();
        link.click();
        showToast('Código descargado');
    }

    function printBarcode() {
        const container = document.getElementById('barcodeContainer');
        if (!container.querySelector('svg')) { showToast('No hay código para imprimir', true); return; }
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>Imprimir código</title><style>body{display:flex;justify-content:center;align-items:center;height:100vh;}</style></head><body>${container.innerHTML}</body></html>`);
        win.document.close(); 
        win.print();
    }

    // Eventos
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    applyManualCodeBtn.addEventListener('click', applyManualCode);
    manualCodeInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') applyManualCode(); });
    productForm.addEventListener('submit', saveProduct);
    clearFormBtn.addEventListener('click', clearForm);
    syncToCloudBtn.addEventListener('click', syncToCloud);
    syncFromCloudBtn.addEventListener('click', syncFromCloud);
    exportExcelBtn.addEventListener('click', exportToExcel);
    exportPdfBtn.addEventListener('click', exportToPdf);
    downloadBarcodeBtn.addEventListener('click', downloadBarcode);
    printBarcodeBtn.addEventListener('click', printBarcode);
    importFileInput.addEventListener('change', (e) => { if(e.target.files[0]) importProducts(e.target.files[0]); e.target.value = ''; });

    // Inicializar
    loadProducts();
    clearForm();
</script>
</body>
</html>
