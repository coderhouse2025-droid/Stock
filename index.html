<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CodeForge Scanner | Escáner + Librería + Códigos de Barras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Librería de escaneo: QuaggaJS (potente para códigos de barras) -->
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eff7 0%, #dce4ef 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 1rem;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: #0a192f;
            padding: 1rem 2rem;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #2b7a7a;
        }

        .logo-area h1 {
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-badge {
            background: rgba(45, 212, 191, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Layout 2 columnas flexible */
        .two-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 70vh;
        }

        /* Panel izquierdo: escáner y libros */
        .scanner-panel {
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 75vh;
        }

        /* Panel derecho: código de barras y formulario */
        .barcode-panel {
            padding: 1.5rem;
            background: #fafcff;
            display: flex;
            flex-direction: column;
        }

        /* Estilos del escáner */
        .scanner-container {
            background: #0f172a;
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }

        #scannerView {
            width: 100%;
            min-height: 280px;
            background: #000;
            position: relative;
        }

        .scanner-controls {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #0a192f;
            color: white;
        }

        .btn-primary:hover { background: #143450; transform: translateY(-1px); }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .book-list {
            margin-top: 1rem;
            max-height: 350px;
            overflow-y: auto;
        }

        .book-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.7rem;
            margin-bottom: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .book-item:hover {
            border-color: #2b7a7a;
            transform: translateX(3px);
        }

        .book-title {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .book-isbn {
            font-size: 0.7rem;
            font-family: monospace;
            color: #5b6e8c;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
            color: #1e2f44;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-family: 'Inter', monospace;
        }

        .scanned-badge {
            background: #2b7a7a20;
            padding: 0.5rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a192fe6;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .two-col-grid {
                grid-template-columns: 1fr;
            }
            .scanner-panel {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <h1><i class="fas fa-camera"></i> CodeForge Scanner</h1>
            <p>Escanea el ISBN y registra tu libro al instante</p>
        </div>
        <div class="stats-badge" id="statsBadge">
            <i class="fas fa-book"></i> <span id="bookCount">0</span> libros
        </div>
    </div>

    <div class="two-col-grid">
        <!-- Panel izquierdo: Escáner + lista de libros -->
        <div class="scanner-panel">
            <h3 style="margin-bottom: 1rem;"><i class="fas fa-qrcode"></i> Escáner de códigos de barras</h3>
            <div class="scanner-container">
                <div id="scannerView"></div>
            </div>
            <div class="scanner-controls">
                <button id="startScannerBtn" class="btn btn-primary"><i class="fas fa-play"></i> Iniciar cámara</button>
                <button id="stopScannerBtn" class="btn btn-danger"><i class="fas fa-stop"></i> Detener</button>
            </div>
            <div id="scanResult" class="scanned-badge">
                <i class="fas fa-info-circle"></i> Escanea un código ISBN
            </div>

            <hr style="margin: 1.2rem 0; border-color: #e2e8f0;">
            <h3><i class="fas fa-book"></i> Mis libros <span id="bookCountInline"></span></h3>
            <div id="bookList" class="book-list">
                <div style="text-align: center; padding: 2rem;">Cargando...</div>
            </div>
            <button id="exportBooksBtn" class="btn" style="width: 100%; margin-top: 1rem; background: #10b981; color: white;">
                <i class="fas fa-download"></i> Exportar biblioteca (JSON)
            </button>
        </div>

        <!-- Panel derecho: Formulario + código de barras generado -->
        <div class="barcode-panel">
            <h3><i class="fas fa-edit"></i> Registrar / Editar libro</h3>
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="form-group">
                    <label><i class="fas fa-barcode"></i> ISBN escaneado</label>
                    <input type="text" id="isbnInput" placeholder="Aparecerá al escanear" readonly style="background:#f1f5f9;">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Título *</label>
                    <input type="text" id="titleInput" required placeholder="Ej: Cien años de soledad">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Autor *</label>
                    <input type="text" id="authorInput" required placeholder="Gabriel García Márquez">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Editorial</label>
                    <input type="text" id="publisherInput" placeholder="Editorial">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Año</label>
                    <input type="number" id="yearInput" placeholder="2024">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-save"></i> Guardar libro
                    </button>
                </div>
                <button type="button" id="clearFormBtn" class="btn" style="width: 100%; background: #e2e8f0; margin-top: 0.5rem;">
                    <i class="fas fa-eraser"></i> Limpiar formulario
                </button>
            </form>

            <hr style="margin: 1.5rem 0;">

            <h4><i class="fas fa-barcode"></i> Código de barras del libro</h4>
            <div id="barcodeContainer" style="background: white; padding: 1rem; border-radius: 1rem; text-align: center; margin-top: 0.5rem;">
                <svg id="barcodeSvg"></svg>
            </div>
            <div style="margin-top: 0.8rem; display: flex; gap: 0.5rem;">
                <button id="downloadBarcodeBtn" class="btn btn-success" style="flex:1;"><i class="fas fa-download"></i> PNG</button>
                <button id="printBarcodeBtn" class="btn btn-warning" style="flex:1;"><i class="fas fa-print"></i> Imprimir</button>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // Base de datos
    let books = [];
    let currentBookId = null;
    let scannerActive = false;

    // Elementos DOM
    const scannerView = document.getElementById('scannerView');
    const startBtn = document.getElementById('startScannerBtn');
    const stopBtn = document.getElementById('stopScannerBtn');
    const scanResultDiv = document.getElementById('scanResult');
    const isbnInput = document.getElementById('isbnInput');
    const titleInput = document.getElementById('titleInput');
    const authorInput = document.getElementById('authorInput');
    const publisherInput = document.getElementById('publisherInput');
    const yearInput = document.getElementById('yearInput');
    const bookIdInput = document.getElementById('bookId');
    const bookForm = document.getElementById('bookForm');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const bookListDiv = document.getElementById('bookList');
    const exportBooksBtn = document.getElementById('exportBooksBtn');
    const bookCountSpan = document.getElementById('bookCount');
    const bookCountInline = document.getElementById('bookCountInline');
    const downloadBarcodeBtn = document.getElementById('downloadBarcodeBtn');
    const printBarcodeBtn = document.getElementById('printBarcodeBtn');

    // Toast
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = isError ? `⚠️ ${msg}` : `✓ ${msg}`;
        toast.style.background = isError ? '#ef4444e6' : '#0a192fe6';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    // Cargar datos
    function loadBooks() {
        const stored = localStorage.getItem('codeforge_scanner_library');
        if (stored) {
            books = JSON.parse(stored);
        } else {
            // Libros demo
            books = [
                { id: '1', title: 'Cien años de soledad', author: 'Gabriel García Márquez', isbn: '9788437604947', publisher: 'Debolsillo', year: '1967' },
                { id: '2', title: 'El Alquimista', author: 'Paulo Coelho', isbn: '9788408045391', publisher: 'Planeta', year: '1988' }
            ];
            saveBooks();
        }
        updateBookList();
    }

    function saveBooks() {
        localStorage.setItem('codeforge_scanner_library', JSON.stringify(books));
        updateStats();
    }

    function updateStats() {
        bookCountSpan.innerText = books.length;
        if (bookCountInline) bookCountInline.innerText = ` (${books.length})`;
    }

    function updateBookList() {
        if (books.length === 0) {
            bookListDiv.innerHTML = '<div style="text-align: center; padding: 2rem; color: #94a3b8;"><i class="fas fa-book-open"></i><br>Sin libros aún.<br>¡Escanea uno!</div>';
            return;
        }

        bookListDiv.innerHTML = books.map(book => `
            <div class="book-item" data-id="${book.id}">
                <div class="book-title">📖 ${escapeHtml(book.title)}</div>
                <div class="book-isbn">🔖 ${escapeHtml(book.isbn)}</div>
                <div>✍️ ${escapeHtml(book.author)}</div>
                <div style="margin-top: 6px;">
                    <button class="edit-book-btn" data-id="${book.id}" style="background:#2b7a7a20; border:none; border-radius:12px; padding:4px 10px; cursor:pointer; margin-right:6px;">✏️ Editar</button>
                    <button class="delete-book-btn" data-id="${book.id}" style="background:#ef444420; border:none; border-radius:12px; padding:4px 10px; cursor:pointer;">🗑️ Eliminar</button>
                </div>
            </div>
        `).join('');

        // Eventos editar/eliminar
        document.querySelectorAll('.edit-book-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                editBookById(id);
            });
        });
        document.querySelectorAll('.delete-book-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                deleteBookById(id);
            });
        });
        document.querySelectorAll('.book-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (!e.target.classList.contains('edit-book-btn') && !e.target.classList.contains('delete-book-btn')) {
                    const id = item.dataset.id;
                    selectBook(id);
                }
            });
        });
    }

    function selectBook(id) {
        const book = books.find(b => b.id === id);
        if (book) {
            bookIdInput.value = book.id;
            isbnInput.value = book.isbn;
            titleInput.value = book.title;
            authorInput.value = book.author;
            publisherInput.value = book.publisher || '';
            yearInput.value = book.year || '';
            currentBookId = id;
            generateBarcode(book.isbn);
            showToast(`Libro seleccionado: ${book.title}`);
        }
    }

    function editBookById(id) {
        selectBook(id);
    }

    function deleteBookById(id) {
        if (confirm('¿Eliminar este libro de tu biblioteca?')) {
            books = books.filter(b => b.id !== id);
            saveBooks();
            if (currentBookId === id) {
                clearForm();
                document.getElementById('barcodeContainer').innerHTML = '<svg id="barcodeSvg"></svg>';
            }
            updateBookList();
            showToast('Libro eliminado');
        }
    }

    function saveBook(event) {
        event.preventDefault();
        const isbn = isbnInput.value.trim();
        const title = titleInput.value.trim();
        const author = authorInput.value.trim();
        const publisher = publisherInput.value.trim();
        const year = yearInput.value;

        if (!isbn || !title || !author) {
            showToast('ISBN, título y autor son obligatorios', true);
            return;
        }

        const id = bookIdInput.value;
        if (id) {
            // Actualizar
            const index = books.findIndex(b => b.id === id);
            if (index !== -1) {
                books[index] = { ...books[index], title, author, isbn, publisher, year };
                saveBooks();
                showToast('Libro actualizado');
                generateBarcode(isbn);
            }
        } else {
            // Nuevo libro
            const newId = Date.now().toString();
            books.push({ id: newId, title, author, isbn, publisher, year });
            saveBooks();
            showToast('Libro agregado');
            bookIdInput.value = newId;
            generateBarcode(isbn);
        }
        updateBookList();
        clearForm(); // Limpia pero mantiene quizás el ISBN? mejor limpiar después de guardar
        // Reseteamos el formulario excepto si queremos seguir agregando, pero limpiamos para próximo escaneo
        clearForm();
    }

    function clearForm() {
        bookIdInput.value = '';
        isbnInput.value = '';
        titleInput.value = '';
        authorInput.value = '';
        publisherInput.value = '';
        yearInput.value = '';
        currentBookId = null;
        document.getElementById('barcodeContainer').innerHTML = '<svg id="barcodeSvg"></svg>';
    }

    function generateBarcode(isbn) {
        if (!isbn) return;
        const container = document.getElementById('barcodeContainer');
        container.innerHTML = '<svg id="barcodeSvg"></svg>';
        const svg = document.getElementById('barcodeSvg');
        try {
            JsBarcode(svg, isbn, {
                format: "CODE128",
                width: 2,
                height: 70,
                lineColor: "#0a192f",
                background: "#ffffff",
                displayValue: true,
                fontSize: 14
            });
        } catch(e) {
            container.innerHTML = '<div style="color:red;">Error generando código</div>';
        }
    }

    // Escáner QuaggaJS
    function startScanner() {
        if (scannerActive) return;
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#scannerView'),
                constraints: { facingMode: "environment" } // Cámara trasera
            },
            decoder: {
                readers: ["code_128_reader", "ean_reader", "ean_8_reader", "upc_reader", "code_39_reader"]
            }
        }, function(err) {
            if (err) {
                showToast("Error al iniciar cámara: " + err, true);
                return;
            }
            Quagga.start();
            scannerActive = true;
            showToast("Cámara activada. Enfoca el código de barras.");
        });

        Quagga.onDetected(function(result) {
            let code = result.codeResult.code;
            if (code) {
                // Detener escaneo tras detectar
                Quagga.stop();
                scannerActive = false;
                scanResultDiv.innerHTML = `<i class="fas fa-check-circle"></i> Código escaneado: ${code}`;
                isbnInput.value = code;
                generateBarcode(code);
                showToast(`ISBN detectado: ${code}`);
                // Verificar si ya existe
                const existing = books.find(b => b.isbn === code);
                if (existing) {
                    showToast(`El libro "${existing.title}" ya está registrado. Editando...`);
                    selectBook(existing.id);
                } else {
                    clearForm();
                    isbnInput.value = code;
                    titleInput.focus();
                }
            }
        });
    }

    function stopScanner() {
        if (scannerActive) {
            Quagga.stop();
            scannerActive = false;
            scanResultDiv.innerHTML = '<i class="fas fa-stop"></i> Cámara detenida';
            showToast("Cámara detenida");
        }
    }

    async function downloadBarcode() {
        const container = document.getElementById('barcodeContainer');
        if (!container.querySelector('svg')) {
            showToast('No hay código generado', true);
            return;
        }
        const canvas = await html2canvas(container, { scale: 3 });
        const link = document.createElement('a');
        link.download = `barcode_${isbnInput.value || 'libro'}.png`;
        link.href = canvas.toDataURL();
        link.click();
        showToast('Código descargado');
    }

    function printBarcode() {
        const container = document.getElementById('barcodeContainer');
        if (!container.querySelector('svg')) {
            showToast('No hay código para imprimir', true);
            return;
        }
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html><head><title>Imprimir código</title></head>
            <body style="display:flex; justify-content:center; align-items:center; height:100vh;">
                ${container.innerHTML}
            </body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    function exportBooks() {
        const data = JSON.stringify(books, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'biblioteca_escaneada.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Biblioteca exportada');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event listeners
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    bookForm.addEventListener('submit', saveBook);
    clearFormBtn.addEventListener('click', clearForm);
    downloadBarcodeBtn.addEventListener('click', downloadBarcode);
    printBarcodeBtn.addEventListener('click', printBarcode);
    exportBooksBtn.addEventListener('click', exportBooks);

    // Inicializar
    loadBooks();
    clearForm();
</script>
</body>
</html>
